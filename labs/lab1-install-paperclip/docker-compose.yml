# ------------------------------------------------------------------------------
# Paperclip — local self-host convenience wrapper (Lab 1)
#
# Paperclip ships its own compose file at docker/docker-compose.quickstart.yml
# inside the cloned repo. This file is a thin, documented copy you can run from
# THIS lab folder after you have cloned the repo next to it, so the build context
# points at the repo. Adjust `context:` if your clone lives elsewhere.
#
# Fastest path (recommended) — run the official file from the repo root instead:
#     docker compose -f docker/docker-compose.quickstart.yml up --build
#
# Then open http://localhost:3100
# ------------------------------------------------------------------------------

services:
  paperclip:
    build:
      # Point at your local Paperclip clone (repo root contains the Dockerfile).
      context: ../paperclip
    container_name: paperclip
    ports:
      # Host 3100 -> container 3100. Override the host port with PAPERCLIP_PORT.
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      - HOST=0.0.0.0
      - PAPERCLIP_HOME=/paperclip
      # --- Optional: enable CLOUD LLM adapters by supplying keys (local CLI
      #     adapters like Claude Code / OpenCode work WITHOUT these). ---
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # ONE bind mount holds EVERYTHING that must survive a restart:
      # embedded PostgreSQL data, uploaded assets, local secrets, and the
      # agent workspace. Delete this folder to reset to a fresh install.
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"
    restart: unless-stopped
